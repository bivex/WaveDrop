name: WaveDrop
options:
  bundleIdPrefix: com.wavedrop
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    BUILD_LIBRARY_FOR_DISTRIBUTION: YES
    ENABLE_PREVIEWS: YES
    SWIFT_STRICT_CONCURRENCY: minimal
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO

configs:
  Debug: debug
  Release: release

targets:
  WaveDrop:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: Models
      - path: ViewModels
      - path: Views
      - path: Services
      - path: Utilities
      - path: Resources
        type: folder
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.wavedrop.app
        PRODUCT_NAME: WaveDrop
        CODE_SIGN_ENTITLEMENTS: ""
    info:
      path: Resources/Info.plist
      properties:
        CFBundleName: WaveDrop
        CFBundleDisplayName: WaveDrop
        CFBundleIdentifier: com.wavedrop.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
    resources:
      - path: Resources
    entitlements:
      path: Resources/WaveDrop.entitlements
      properties:
        com.apple.security.files.user-selected.read-write: true

fileGroups:
  - path: Resources
    name: Resources
